name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
hassfest:
   name: Hassfest validation
   runs-on: ubuntu-latest
   steps:
     - name: Checkout
       uses: actions/checkout@v5

     - name: Hassfest validation
       uses: home-assistant/actions/hassfest@master
